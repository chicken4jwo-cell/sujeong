<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>포트폴리오 웹사이트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    section {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      color: #4CAF50;
    }
    img {
      max-width: 100%;
      border-radius: 5px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #eee;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>웹디자인 과제 포트폴리오</h1>
    <p>한양사이버대학교 시각디자인학과 이수정</p>
  </header>

  <section>
    <h2>자기소개</h2>
    <p>안녕하세요, 저는 웹디자인 수업을 듣고 있는 이수정입니다. 이번 학기 과제를 위해 포트폴리오 웹사이트를 제작했습니다.</p>
  </section>

  <section>
    <h2>프로젝트 소개</h2>
    <p>이번 프로젝트에서는 HTML과 CSS를 활용하여 기본적인 웹페이지를 구성했습니다.</p>
    <img src="images/sample.jpg" alt="프로젝트 이미지">
  </section>

  <section>
    <h2>디자인 포인트</h2>
    <ul>
      <li>RGB 기반의 밝은 색상 사용</li>
      <li>심플하고 직관적인 레이아웃</li>
      <li>저작권 문제 없는 이미지 활용</li>
    </ul>
  </section>

  <footer>
    <p>방문해주셔서 감사합니다!</p>
  </footer>
</body>
</html>
