<!DOCTYPE html>
<html lang="ko">
<head>

  <title>웹디자인 과제 포트폴리오</title>
  <style>
    body {
      width: 1920px;   /* 가로 폭 고정 */
      margin: 0 auto;  /* 화면 가운데 정렬 */
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    header, section {
      background: #fff;
      margin: 20px;
      padding: 20px;
      border-radius: 8px;
    }
    h1, h2 {
      color: #2e7d32; /* 녹색 계열 헤더 */
    }
    img {
      display: block;
      margin: 20px auto;
      max-width: 100%; /* 1920px 안에서 자동 조절 */
      height: auto;    /* 세로 자유 */
    }
  </style>
</head>
<body>
  <header>
    <h1>웹디자인 과제 포트폴리오</h1>
    <p>한양사이버대학교 시각디자인학과 이수정</p>
  </header>

  <section>
    <h2>자기소개</h2>
    <p>안녕하세요, 저는 웹디자인 수업을 듣고 있는 이수정입니다. 이번 학기 과제를 위해 포트폴리오 웹사이트를 제작했습니다.</p>
  </section>

  <section>
    <h2>프로젝트 소개</h2>
    <p>이번 프로젝트에서는 HTML과 CSS를 활용하여 기본적인 웹페이지를 구성했습니다.</p>
    <!-- 업로드한 이미지 삽입 -->
    <img src="pexels-malek-dridi-231937-977881.jpg" alt="프로젝트 이미지">
  </section>

  <section>
    <h2>디자인 포인트</h2>
    <ul>
      <li>RGB 기반의 밝은 색상 사용</li>
      <li>심플하고 직관적인 레이아웃</li>
      <li>저작권 문제 없는 이미지 활용</li>
    </ul>
  </section>
</body>
</html>
